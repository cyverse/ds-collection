---
- name: Prepare
  hosts: all
  tasks:
    - name: Install ufw
      ansible.builtin.package:
        name: ufw
        state: present

    - name: Create zones folder
      ansible.builtin.file:
        path: /etc/firewalld/zones
        state: directory
        recurse: true

    - name: Place maintenance_operation.xml
      ansible.builtin.copy:
        dest: /etc/firewalld/zones/maintenance_operation.xml
        content: |
          <?xml version="1.0" encoding="utf-8"?>

          <!--
           -
           - Ansible managed: Do NOT edit this file manually!
           -
          -->

          <zone target="ACCEPT">
            <short>maintenance_operation</short>
            <description>All hosts that are allowed to access the hosted services.</description>
            <service name="maintenance"/>
            <source ipset="maintenance_system"/>
            <source ipset="maintenance_external"/>
          </zone>
        mode: a+rw

    - name: Place operation_operation.xml
      ansible.builtin.copy:
        dest: /etc/firewalld/zones/operation_operation.xml
        content: |
          <?xml version="1.0" encoding="utf-8"?>

          <!--
           -
           - Ansible managed: Do NOT edit this file manually!
           -
          -->

          <zone target="ACCEPT">
            <short>operation_operation</short>
            <description>All hosts that are allowed to access the hosted services.</description>
            <service name="operation"/>
          </zone>
        mode: a+rw

    - name: Place testing_operation.xml
      ansible.builtin.copy:
        dest: /etc/firewalld/zones/testing_operation.xml
        content: |
          <?xml version="1.0" encoding="utf-8"?>

          <!--
           -
           - Ansible managed: Do NOT edit this file manually!
           -
          -->

          <zone target="ACCEPT">
            <short>testing_operation</short>
            <description>All hosts that are allowed to access the hosted services.</description>
            <service name="testing"/>
            <source ipset="testing_external"/>
          </zone>
        mode: a+rw
