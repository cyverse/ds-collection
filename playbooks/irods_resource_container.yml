---
- name: Prepare docker repository
  hosts: irods_resource_container
  become: true
  pre_tasks:
    - name: Enable notifications
      ansible.builtin.set_fact:
        _enable_notifications: true
      tags:
        - no_testing

    - name: Set up Docker repository on AlmaLinux
      when: ansible_distribution == 'AlmaLinux'
      block:
        - name: Install DNF core plugins
          ansible.builtin.package:
            name: dnf-plugins-core

        - name: Add Docker repository
          ansible.builtin.command:
            cmd: dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
            creates: /etc/yum.repos.d/docker-ce.repo

    - name: Set up Docker repository on Ubuntu
      when: ansible_distribution == 'Ubuntu'
      block:
        - name: Ensure keyrings folder exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: a+rx

        - name: Install docker repo key
          ansible.builtin.uri:
            url: https://download.docker.com/linux/ubuntu/gpg
            status_code:
              - 200
              - 304
            dest: /etc/apt/keyrings/docker.asc
            mode: a+r

        - name: Get dpkg architecture
          ansible.builtin.command: dpkg --print-architecture
          changed_when: false
          register: dpkg_resp

        - name: Install docker repo source
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/docker.list
            content: >
              deb [arch={{ dpkg_resp.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
              https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
            mode: a+r
          notify: Update apt cache

  tasks:
    - name: Update package cache on AlmaLinux hosts
      when: ansible_distribution == 'AlmaLinux'
      ansible.builtin.dnf:
        update_cache: true

    - name: Update stale apt cache
      when: ansible_distribution == 'Ubuntu'
      ansible.builtin.apt:
        update_cache: true

    - name: Install required packages
      ansible.builtin.package:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - logrotate
          - rsyslog

    - name: Ensure rsyslog is running
      ansible.builtin.service:
        name: rsyslog
        enabled: true
        state: started
      tags: no_testing

    - name: Configure docker daemon for syslog
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "syslog",
            "log-opts": {
              "tag": {% raw %}"docker-{{.Name}}"{% endraw %}
            }
          }
        mode: u+r
      notify: Restart docker

    - name: Ensure docker is running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started
      tags: no_testing

  post_tasks:
    - name: Create iRODS user
      ansible.builtin.user:
        name: irods
        comment: iRODS Administrator
        system: true
        home: /var/lib/irods
        create_home: true
        shell: /bin/bash
        append: true
        groups:
          - docker

    - name: Create iRODS configuration directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: irods
        group: irods
        mode: u+rwx
      loop:
        - /irods_vault
        - /etc/irods
        - /var/lib/irods/.irods
        - /var/lib/irods/msiExecCmd_bin

    - name: Add irodsctl adapter
      ansible.builtin.copy:
        src: files/irods/docker-rs/irodsctl
        dest: /var/lib/irods/irodsctl
        owner: irods
        group: irods
        mode: u+rx

    - name: Copy required iRODS runtime config files
      ansible.builtin.copy:
        src: files/irods/docker-rs/run/etc/irods/{{ item }}
        dest: /etc/irods
        owner: irods
        group: irods
        mode: u+r
      loop:
        - core.dvm
        - core.fnm

    - name: Generate core.re
      ansible.builtin.template:
        src: templates/irods/docker-rs/run/etc/irods/core.re.j2
        dest: /etc/irods/core.re
        owner: irods
        group: irods
        mode: u+r

    - name: Generate iRODS config files
      ansible.builtin.import_role:
        name: cyverse.ds.irods_cfg
      vars:
        irods_cfg_authentication_file: /var/lib/irods/.irods/.irodsA
        irods_cfg_catalog_provider_hosts: "{{ groups['irods_catalog'] }}"
        irods_cfg_catalog_service_role: consumer
        irods_cfg_chown: false
        irods_cfg_client_server_policy: "{{ _irods_client_server_policy }}"
        irods_cfg_cmd_scripts: files/irods/var/lib/irods/msiExecCmd_bin/*
        irods_cfg_default_dir_mode: "{{ _irods_default_dir_mode }}"
        irods_cfg_default_file_mode: "{{ _irods_default_file_mode }}"
        irods_cfg_default_hash_scheme: "{{ _irods_default_hash_scheme }}"
        irods_cfg_default_number_of_transfer_threads: >-
          {{ _irods_default_number_of_transfer_threads }}
        irods_cfg_default_resource_name: "{{ _irods_default_resource }}"
        irods_cfg_federation: "{{ _irods_federation }}"
        irods_cfg_host_entries: >-
          {{ [] if _irods_host_aliases | count == 0 else
            [
              {
                'address_type': 'local',
                'addresses': [inventory_hostname] + _irods_host_aliases
              }
            ] }}
        irods_cfg_host: "{{ inventory_hostname }}"
        irods_cfg_negotiation_key: "{{ _irods_negotiation_key }}"
        irods_cfg_re:
          additional_rulebases:
            - cve
            - cyverse_core
            - cyverse_housekeeping
        irods_cfg_rulebases_static: files/irods/etc/irods/*
        irods_cfg_rulebases_templated: templates/irods/etc/irods/*
        irods_cfg_schema_validation_base_uri: 'off'
        irods_cfg_server_control_plane_key: "{{ _irods_server_control_plane_key }}"
        irods_cfg_server_port_range_end: "{{ _irods_server_port_range_end }}"
        irods_cfg_server_port_range_start: "{{ _irods_server_port_range_start }}"
        irods_cfg_system_account_name: "{{ _irods_service_account_name }}"
        irods_cfg_system_group_name: "{{ _irods_service_group_name }}"
        irods_cfg_transfer_buffer_size_for_parallel_transfer: >-
          {{ _irods_parallel_transfer_buffer_size }}
        irods_cfg_validate: false
        irods_cfg_zone_key: "{{ _irods_zone_key }}"
        irods_cfg_zone_name: "{{ _irods_zone_name }}"
        irods_cfg_zone_user: "{{ _irods_clerver_user }}"
      notify: Restart irods

    - name: Add build dir
      ansible.builtin.file:
        path: /var/lib/irods/build
        state: directory
        owner: irods
        group: irods
        mode: u+rx

    - name: Copy resource server image source
      ansible.builtin.copy:
        src: files/irods/docker-rs/build/{{ item }}
        dest: /var/lib/irods/build
        owner: irods
        group: irods
        mode: u+r
      notify: Rebuild docker container
      loop:
        - entrypoint.sh
        - Dockerfile

    - name: Get service account info
      ansible.builtin.getent:
        database: passwd
        key: irods

    - name: Set irods user uid
      ansible.builtin.set_fact:
        _irods_host_uid: "{{ getent_passwd['irods'][1] }}"

    - name: Generate .env file
      ansible.builtin.template:
        src: templates/irods/docker-rs/env.j2
        dest: /var/lib/irods/.env
        owner: irods
        group: irods
        mode: u+r
      notify: Rebuild docker container

    - name: Copy docker-compose.yml file
      ansible.builtin.copy:
        src: files/irods/docker-rs/docker-compose.yml
        dest: /var/lib/irods/docker-compose.yml
        owner: irods
        group: irods
        mode: u+r
      notify: Rebuild docker container

    - name: Configure rsyslog for iRODS
      ansible.builtin.copy:
        dest: /etc/rsyslog.d/00-irods.conf
        content: |
          $FileCreateMode 0644
          $DirCreateMode 0755
          $Umask 0000
          $template irods_format,"%msg%\n"
          :programname,startswith,"docker-cyverse-irods" /var/log/irods/irods.log;irods_format
          & stop
        mode: u+r
      notify: Restart rsyslog

    - name: Configure log rotations for iRODS
      ansible.builtin.template:
        src: irods/etc/logrotate.d/irods.j2
        dest: /etc/logrotate.d/irods
        mode: u+r

    - name: Start docker image
      community.docker.docker_compose_v2:
        project_src: /var/lib/irods
      tags: no_testing

  handlers:
    - name: Rebuild docker container
      when: _enable_notifications | d(false)
      community.docker.docker_compose_v2:
        project_src: /var/lib/irods
        build: always

    - name: Restart docker
      when: _enable_notifications | d(false)
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: Restart irods
      when: _enable_notifications | d(false)
      become_user: irods
      ansible.builtin.command: /var/lib/irods/irodsctl restart

    - name: Restart rsyslog
      when: _enable_notifications | d(false)
      ansible.builtin.service:
        name: rsyslog
        state: restarted

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
