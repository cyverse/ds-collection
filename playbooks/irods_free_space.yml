---
- name: Update resource free space
  hosts: irods_resource
  tasks:
    - name: Set resource free space
      ansible.builtin.include_tasks: tasks/irods/set_resc_free_space.yml
      vars:
        resource_name: "{{ item.name }}"
        vault_path: "{{ item.vault }}"
      loop: "{{ _irods_storage_resources }}"
