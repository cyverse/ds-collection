---
- name: Test create ICAT DB
  hosts: dbms_primary
  run_once: true
  become: true
  become_user: postgres
  tasks:
    - name: Test ensure ICAT database exists
      ansible.builtin.command: psql --command='\quit' ICAT
      changed_when: false

    - name: Verify irods DBMS user exists
      ansible.builtin.command: psql --no-align --tuples-only --command='\du irods'
      register: response
      failed_when: response.stdout | length == 0
      changed_when: false

    - name: Verify irods DBMS user password
      ansible.builtin.command: psql --list ICAT irods
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify irods DBMS user has all privileges on ICAT
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          set -o pipefail
          psql --command='\l "ICAT"' | grep --quiet 'irods=CTc'
      changed_when: false

    - name: Verify client host access
      ansible.builtin.debug:
        msg: TODO implement

    - name: Test create transfer totals table
      ansible.builtin.debug:
        msg: TODO implement

    - name: Test create index for transfer totals table
      ansible.builtin.debug:
        msg: TODO implement
