---
- name: Test create vaults
  hosts: irods_resource_native:!unmanaged_systems
  become: true
  tasks:
    - name: Test create vault directory
      ansible.builtin.stat:
        path: "{{ item.vault }}"
      register: response
      failed_when: >-
        not response.stat.exists
        or not response.stat.isdir
        or response.stat.pw_name != 'irods'
        or not response.stat.rusr
        or not response.stat.wusr
        or not response.stat.xusr
      with_items: "{{ irods_storage_resources }}"

- name: Test create storage resources
  hosts: irods_resource_native
  vars:
    expected_resources: "{{
      groups['irods_resource']
        | map('extract', hostvars)
        | flatten
        | selectattr('irods_storage_resources', 'defined')
        | map(attribute='irods_storage_resources')
        | flatten
        | map(attribute='name')
        | union(['bundleResc']) }}"
  tasks:
    - name: Test define storage resource
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          iinit <<< password > /dev/null
          iquest '%s' "select RESC_NAME where RESC_TYPE_NAME = 'unixfilesystem'"
      register: response
      changed_when: false
      failed_when: >-
        response.stdout_lines | symmetric_difference(expected_resources) | list | length > 0

    - name: Verify context is correct
      delegate_to: localhost
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          iinit <<< password > /dev/null
          if ! context="$(iquest '%s' "select RESC_CONTEXT where RESC_NAME = '{{ item.name }}'")"
          then
            exit 1
          fi
          test "$context" = '{{ item.context }}'
      changed_when: false
      with_items: "{{ irods_storage_resources }}"

    - name: Verify status has been initialized
      delegate_to: localhost
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          iinit <<< password > /dev/null
          if ! status="$(iquest '%s' "select RESC_STATUS where RESC_NAME = '{{ item.name }}'")"
          then
            exit 1
          fi
          test "$status" = up
      changed_when: false
      with_items: "{{ irods_storage_resources }}"

- name: Verify free space set
  ansible.builtin.import_playbook: irods_free_space.yml